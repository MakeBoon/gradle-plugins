name: Publish Catalogs

# The Gradle Plugin Portal only hosts plugins, so version catalogs
# (:catalog:*) go to Maven Central instead. Run manually when needed.
on:
  workflow_dispatch:

jobs:
  maven-central:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - uses: gradle/actions/setup-gradle@v4

      # Uploads a deployment to the Central Portal.
      # It stays in "validated" state until released manually in the Portal UI
      # (set mavenCentralAutomaticPublishing=true in gradle.properties, or use
      # publishAndReleaseToMavenCentral, to release automatically).
      - name: Publish to Maven Central
        run: ./gradlew publishToMavenCentral --no-configuration-cache
        env:
          ORG_GRADLE_PROJECT_signAllPublications: true
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.SIGNING_IN_MEMORY_KEY }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_IN_MEMORY_KEY_PASSWORD }}
